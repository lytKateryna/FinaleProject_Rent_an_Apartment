services:
  web:
   container_name: RentHub
   build:
      context: .
      dockerfile: Dockerfile
   restart: always

   command: >
      sh -c "
        python manage.py migrate &&
        python manage.py runserver 0.0.0.0:8000
      "

   env_file:
      - .env

   environment:
      USE_REMOTE_DB: "True"
      DB_ENGINE: mysql
      DB_HOST: database
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

   ports:
      - "8000:8000"
   volumes:
      - app_logs:/app/logs
      - avatars:/app/avatars
   depends_on:
     database:
       condition: service_healthy

   networks:
      - django_app

  database:
    image: mysql:8.4

    restart: always

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}

    volumes:
      - mysql_data:/var/lib/mysql

    ports:
      - "33066:3306"

    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u\"$$MYSQL_USER\" -p\"$$MYSQL_PASSWORD\" --silent" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

    networks:
      - django_app

volumes:
  app_logs:
  avatars:
  mysql_data:

networks:
  django_app:
    driver: bridge
